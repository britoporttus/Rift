name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy production
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd /home/digitalbath/rift
          git pull origin main

      - name: Install backend dependencies
        run: |
          cd /home/digitalbath/rift/backend
          npm ci --omit=dev

      - name: Install & build frontend
        run: |
          cd /home/digitalbath/rift/frontend
          npm ci
          npm run build

      - name: Restart services
        run: |
          source ~/.nvm/nvm.sh
          cd /home/digitalbath/rift
          pm2 reload ecosystem.config.js --update-env
          pm2 status
