name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy production
    runs-on: self-hosted

    steps:
      - name: Pull latest code
        run: |
          cd /home/digitalbath/rift
          git pull origin main

      - name: Install dependencies
        run: |
          cd /home/digitalbath/rift
          npm install

      - name: Build frontend
        run: |
          cd /home/digitalbath/rift/frontend
          npm run build

      - name: Restart services
        run: |
          source ~/.nvm/nvm.sh
          cd /home/digitalbath/rift
          pm2 restart ecosystem.config.js --update-env
          pm2 status
